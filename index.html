<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Aplicación de geolocalización en tiempo real con mapa interactivo y temperatura" />
  <title>Mi Ubicación en Vivo</title>

  <!-- Iconoir Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@main/css/iconoir.css" />
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --accent:  #f0b429;
      --accent2: #e05c2a;
      --safe:    #3fb950;
      --muted:   #6e7681;
      --text:    #e6edf3;
      --text2:   #8b949e;
      --panel-h: 300px;
      --hud-h:   52px;
      --radius:  14px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --temp-cold: #2563eb;
      --temp-cool: #06b6d4;
      --temp-warm: #f59e0b;
      --temp-hot: #ef4444;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ════ SPLASH ════════════════════════════════════ */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(135deg, var(--bg) 0%, var(--surface) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity var(--transition), visibility var(--transition);
    }

    #splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .s-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .s-ring::after {
      content: '';
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--accent2);
      position: absolute;
      animation: spin 0.7s linear infinite reverse;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .s-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .s-sub {
      font-size: 13px;
      color: var(--muted);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ════ PERMISO DENEGADO ══════════════════════════ */
    #permDenied {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(13, 17, 23, 0.96);
      backdrop-filter: blur(10px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 32px;
    }

    #permDenied.show {
      display: flex;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    #permDenied i {
      font-size: 52px;
      color: var(--accent2);
    }

    #permDenied h2 {
      font-size: 20px;
      font-weight: 700;
    }

    #permDenied p {
      font-size: 13px;
      color: var(--muted);
      max-width: 300px;
      line-height: 1.65;
    }

    #btnRetry {
      margin-top: 8px;
      background: linear-gradient(135deg, var(--accent) 0%, #e08d1a 100%);
      color: #0d1117;
      border: none;
      border-radius: 10px;
      padding: 12px 32px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 4px 15px rgba(240, 180, 41, 0.2);
    }

    #btnRetry:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(240, 180, 41, 0.3);
    }

    #btnRetry:active {
      transform: translateY(0);
    }

    /* ════ HUD ───────────────────────────────────── */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--hud-h);
      background: rgba(13, 17, 23, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 500;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .hud-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: all var(--transition);
    }

    .hud-dot.searching {
      background: var(--accent);
      animation: blink 1s ease infinite;
    }

    .hud-dot.active {
      background: var(--safe);
      box-shadow: 0 0 8px var(--safe), inset 0 0 4px rgba(63, 185, 80, 0.5);
      animation: blink 2s ease infinite;
    }

    @keyframes blink {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.35;
      }
    }

    .hud-title {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .hud-badge {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all var(--transition);
    }

    .hud-badge.ok {
      color: var(--safe);
      border-color: rgba(63, 185, 80, 0.4);
      background: rgba(63, 185, 80, 0.08);
    }

    .hud-badge i {
      font-size: 12px;
    }

    /* ════ MAPA LEAFLET ══════════════════════════ */
    #map {
      position: fixed;
      top: var(--hud-h);
      left: 0;
      right: 0;
      bottom: var(--panel-h);
      background: #1a2030;
      z-index: 1;
    }

    .leaflet-bottom.leaflet-right {
      bottom: 8px;
      right: 8px;
    }

    .leaflet-control-zoom {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3) !important;
    }

    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
      border: 1px solid var(--border) !important;
      font-weight: 600;
    }

    .leaflet-control-zoom a:hover {
      background: var(--bg) !important;
      border-color: var(--accent) !important;
    }

    /* Marcador personalizado */
    .my-marker {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid #fff;
      box-shadow: 0 0 0 0 rgba(240, 180, 41, 0.6);
      animation: ripple 2s ease-out infinite;
    }

    @keyframes ripple {
      0% {
        box-shadow: 0 0 0 0 rgba(240, 180, 41, 0.6);
      }
      70% {
        box-shadow: 0 0 0 16px rgba(240, 180, 41, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(240, 180, 41, 0);
      }
    }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      font-size: 12px !important;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5) !important;
      font-family: inherit !important;
    }

    .leaflet-popup-tip {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
    }

    .leaflet-popup-content {
      margin: 12px 14px !important;
      line-height: 1.7;
    }

    .leaflet-popup-content b {
      color: var(--accent);
    }

    /* ════ PANEL INFERIOR ══════════════════════════ */
    #panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--panel-h);
      background: rgba(18, 23, 30, 0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 16px 16px max(20px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 400;
      box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.3);
      overflow-y: auto;
      overflow-x: hidden;
    }

    #panel::before {
      content: '';
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Coordenadas */
    #coordsBox {
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 13px;
      gap: 10px;
      transition: all var(--transition);
    }

    #coordsBox:hover {
      border-color: var(--accent);
      background: rgba(240, 180, 41, 0.05);
    }

    #coordsBox > i {
      font-size: 18px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .c-data {
      flex: 1;
      min-width: 0;
    }

    .c-main {
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.2px;
    }

    .c-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      font-variant-numeric: tabular-nums;
    }

    #btnCopy {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 7px 11px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    #btnCopy:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(240, 180, 41, 0.08);
    }

    #btnCopy.copied {
      border-color: var(--safe);
      color: var(--safe);
      background: rgba(63, 185, 80, 0.08);
    }

    /* ══════ TEMPERATURA ════════════════════════════ */
    #tempBox {
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      gap: 12px;
      transition: all var(--transition);
    }

    #tempBox.loading {
      opacity: 0.6;
      border-color: var(--muted);
    }

    #tempBox.cold {
      border-color: rgba(37, 99, 235, 0.4);
      background: rgba(37, 99, 235, 0.08);
    }

    #tempBox.cool {
      border-color: rgba(6, 182, 212, 0.4);
      background: rgba(6, 182, 212, 0.08);
    }

    #tempBox.warm {
      border-color: rgba(245, 158, 11, 0.4);
      background: rgba(245, 158, 11, 0.08);
    }

    #tempBox.hot {
      border-color: rgba(239, 68, 68, 0.4);
      background: rgba(239, 68, 68, 0.08);
    }

    #tempIcon {
      font-size: 24px;
      flex-shrink: 0;
    }

    .temp-data {
      flex: 1;
      min-width: 0;
    }

    .temp-value {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .temp-value.cold {
      color: var(--temp-cold);
    }

    .temp-value.cool {
      color: var(--temp-cool);
    }

    .temp-value.warm {
      color: var(--temp-warm);
    }

    .temp-value.hot {
      color: var(--temp-hot);
    }

    .temp-value span {
      font-size: 12px;
      color: var(--muted);
    }

    .temp-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .temp-refresh {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all var(--transition);
      color: var(--text2);
      font-size: 14px;
    }

    .temp-refresh:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(240, 180, 41, 0.08);
    }

    .temp-refresh.refreshing {
      animation: spin 1s linear infinite;
    }

    /* Stats */
    .stats-row {
      display: flex;
      gap: 8px;
    }

    .stat-chip {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      text-align: center;
      transition: all var(--transition);
    }

    .stat-chip:hover {
      border-color: var(--accent);
      background: rgba(240, 180, 41, 0.05);
    }

    .s-val {
      font-size: 13px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.3px;
    }

    .s-val.y {
      color: var(--accent);
    }

    .s-val.g {
      color: var(--safe);
    }

    .s-lbl {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    /* Botones */
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 11px 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .btn:active {
      transform: scale(0.95);
      opacity: 0.8;
    }

    .btn i {
      font-size: 16px;
    }

    .btn-wa {
      background: linear-gradient(135deg, #25D366 0%, #20ba5a 100%);
      color: #fff;
      box-shadow: 0 2px 8px rgba(37, 211, 102, 0.2);
    }

    .btn-wa:hover {
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
      transform: translateY(-1px);
    }

    .btn-share {
      background: linear-gradient(135deg, var(--accent) 0%, #e08d1a 100%);
      color: #0d1117;
      box-shadow: 0 2px 8px rgba(240, 180, 41, 0.2);
    }

    .btn-share:hover {
      box-shadow: 0 4px 12px rgba(240, 180, 41, 0.3);
      transform: translateY(-1px);
    }

    .btn-gmap {
      flex: 0 0 auto;
      padding: 11px 14px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-gmap:hover {
      border-color: var(--accent);
      background: rgba(240, 180, 41, 0.08);
    }

    /* ════ TOAST ═════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: calc(var(--panel-h) + 14px);
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(28, 34, 44, 0.98);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all var(--transition);
      z-index: 600;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.ok {
      border-color: rgba(63, 185, 80, 0.5);
      color: var(--safe);
      background: rgba(63, 185, 80, 0.1);
    }

    #toast.err {
      border-color: rgba(224, 92, 42, 0.5);
      color: var(--accent2);
      background: rgba(224, 92, 42, 0.1);
    }

    /* ════ RESPONSIVE ═══���════════════════════════ */
    @media (max-width: 480px) {
      :root {
        --panel-h: 340px;
      }

      .btn {
        font-size: 12px;
        padding: 10px 10px;
      }

      .stat-chip {
        padding: 8px 8px;
      }

      .s-val {
        font-size: 12px;
      }

      #tempBox {
        padding: 10px 12px;
      }

      .temp-value {
        font-size: 14px;
      }
    }

    /* Scrollbar personalizado */
    #panel::-webkit-scrollbar {
      width: 4px;
    }

    #panel::-webkit-scrollbar-track {
      background: transparent;
    }

    #panel::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    #panel::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }
  </style>
</head>
<body>
  <!-- SPLASH -->
  <div id="splash">
    <div class="s-ring"></div>
    <div class="s-title">📍 Ubicación en Vivo</div>
    <div class="s-sub" id="splashMsg">Solicitando acceso al GPS…</div>
  </div>

  <!-- PERMISO DENEGADO -->
  <div id="permDenied">
    <i class="iconoir-map-xmark"></i>
    <h2>Permiso requerido</h2>
    <p>Debes autorizar el acceso a tu ubicación desde la configuración de tu navegador para continuar.</p>
    <button id="btnRetry" onclick="location.reload()" aria-label="Reintentar y recargar la aplicación">🔄 Intentar de nuevo</button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-dot searching" id="hudDot"></div>
    <span class="hud-title">Mi Ubicación en Vivo</span>
    <span class="hud-badge" id="hudBadge">
      <i class="iconoir-satellite"></i>
      <span id="hudAcc">Buscando…</span>
    </span>
  </div>

  <!-- MAPA LEAFLET -->
  <div id="map" role="region" aria-label="Mapa interactivo con tu ubicación actual"></div>

  <!-- PANEL -->
  <div id="panel">
    <!-- Coordenadas -->
    <div id="coordsBox">
      <i class="iconoir-position"></i>
      <div class="c-data">
        <div class="c-main" id="cMain">Obteniendo posición…</div>
        <div class="c-sub" id="cSub">Activando GPS</div>
      </div>
      <button id="btnCopy" onclick="copyCoords()" title="Copiar coordenadas" aria-label="Copiar coordenadas al portapapeles">
        <i class="iconoir-copy"></i> <span>Copiar</span>
      </button>
    </div>

    <!-- Temperatura -->
    <div id="tempBox" class="loading">
      <i class="iconoir-cloud-sun" id="tempIcon"></i>
      <div class="temp-data">
        <div class="temp-value" id="tempValue">
          <span>—°C</span>
        </div>
        <div class="temp-label" id="tempLabel">Obteniendo temperatura…</div>
      </div>
      <button class="temp-refresh" id="tempRefresh" onclick="fetchTemperature()" title="Actualizar temperatura" aria-label="Actualizar información de temperatura">
        <i class="iconoir-refresh"></i>
      </button>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-chip">
        <div class="s-val y" id="sLat">—</div>
        <div class="s-lbl">Latitud</div>
      </div>
      <div class="stat-chip">
        <div class="s-val y" id="sLon">—</div>
        <div class="s-lbl">Longitud</div>
      </div>
      <div class="stat-chip">
        <div class="s-val g" id="sAcc">—</div>
        <div class="s-lbl">Precisión</div>
      </div>
    </div>

    <!-- Botones de acción -->
    <div class="btn-row">
      <button class="btn btn-wa" onclick="shareWA()" title="Compartir en WhatsApp" aria-label="Compartir tu ubicación en WhatsApp">
        <i class="iconoir-chat-bubble"></i> WhatsApp
      </button>
      <button class="btn btn-share" onclick="shareNative()" title="Compartir ubicación" aria-label="Compartir tu ubicación con otra aplicación">
        <i class="iconoir-share-android"></i> Compartir
      </button>
      <button class="btn btn-gmap" onclick="openGMaps()" title="Abrir en Google Maps" aria-label="Abrir tu ubicación en Google Maps">
        <i class="iconoir-map"></i> Mapas
      </button>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // ════════════════════════════════════════════════════════════
    // ESTADO GLOBAL
    // ════════════════════════════════════════════════════════════
    const STATE = {
      lat: null,
      lon: null,
      acc: null,
      alt: null,
      heading: null,
      speed: null,
      temp: null,
      watchId: null,
      map: null,
      marker: null,
      circle: null,
      firstFix: false,
      tempUpdateInterval: null,
      isDestroyed: false,
    };

    // ═══════════════════════════════════════════════════════════
    // INICIALIZACIÓN DEL MAPA
    // ════════════════════════════════════════════════════════════
    function initMap() {
      STATE.map = L.map('map', {
        zoomControl: true,
        attributionControl: true,
        preferCanvas: true,
      });

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        minZoom: 2,
        attribution:
          '© <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a>',
      }).addTo(STATE.map);

      STATE.map.setView([10.48, -66.86], 5);
      L.control.scale({ position: 'bottomleft', imperial: false }).addTo(STATE.map);
    }

    // ═══════════════════════════════════════════════════════���════
    // POSICIÓN EN EL MAPA
    // ════════════════════════════════════════════════════════════
    function placeMarker(lat, lon, acc, alt = null, heading = null) {
      const pos = [lat, lon];

      if (!STATE.marker) {
        const icon = L.divIcon({
          className: 'custom-marker',
          html: '<div class="my-marker"></div>',
          iconSize: [20, 20],
          iconAnchor: [10, 10],
          popupAnchor: [0, -14],
        });

        STATE.marker = L.marker(pos, { icon }).addTo(STATE.map);
        STATE.marker.bindPopup('', { maxWidth: 250, closeButton: false });

        STATE.circle = L.circle(pos, {
          radius: acc,
          color: '#f0b429',
          fillColor: '#f0b429',
          fillOpacity: 0.08,
          weight: 1.5,
          dashArray: '4 4',
        }).addTo(STATE.map);
      } else {
        STATE.marker.setLatLng(pos);
        STATE.circle.setLatLng(pos).setRadius(acc);
      }

      updatePopup(lat, lon, acc, alt, heading);

      if (!STATE.firstFix) {
        STATE.firstFix = true;
        const zoom = acc < 20 ? 18 : acc < 100 ? 16 : acc < 500 ? 14 : 13;
        STATE.map.setView(pos, zoom, { animate: true });
        STATE.marker.openPopup();
        hideSplash();
        
        // Obtener temperatura inmediatamente
        fetchTemperature();
        
        // Actualizar temperatura cada 30 minutos automáticamente
        STATE.tempUpdateInterval = setInterval(() => {
          if (!STATE.isDestroyed) {
            fetchTemperature();
          }
        }, 1800000);
      }
    }

    // ════════════════════════════════════════════════════════════
    // ACTUALIZAR POPUP (Centralizado)
    // ════════════════════════════════════════════════════════════
    function updatePopup(lat, lon, acc, alt = null, heading = null) {
      if (!STATE.marker) return;

      const accStr = acc < 1000 ? `${Math.round(acc)} m` : `${(acc / 1000).toFixed(1)} km`;
      let popupHTML = `
        <b>📍 Mi posición actual</b><br>
        Lat: <b>${lat.toFixed(6)}</b><br>
        Lon: <b>${lon.toFixed(6)}</b><br>
        Precisión: ±${accStr}
      `;

      if (alt !== null) {
        popupHTML += `<br>Altitud: <b>${Math.round(alt)} m</b>`;
      }

      if (heading !== null && heading >= 0) {
        popupHTML += `<br>Rumbo: <b>${Math.round(heading)}°</b>`;
      }

      if (STATE.temp !== null) {
        popupHTML += `<br>Temperatura: <b>${STATE.temp}°C</b>`;
      }

      STATE.marker.setPopupContent(popupHTML);
    }

    // ════════════════════════════════════════════════════════════
    // TEMPERATURA EN TIEMPO REAL (Open-Meteo API)
    // ════════════════════════════════════════════════════════════
    async function fetchTemperature() {
      if (STATE.lat === null || STATE.lon === null || STATE.isDestroyed) return;

      const tempBox = document.getElementById('tempBox');
      const refreshBtn = document.getElementById('tempRefresh');
      const tempValue = document.getElementById('tempValue');
      const tempLabel = document.getElementById('tempLabel');
      const tempIcon = document.getElementById('tempIcon');

      if (!tempBox || !refreshBtn) return;

      tempBox.classList.add('loading');
      refreshBtn.classList.add('refreshing');

      try {
        // Open-Meteo API - Completamente GRATIS, SIN API KEY
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${STATE.lat}&longitude=${STATE.lon}&current=temperature_2m,weather_code&timezone=auto`;
        
        const response = await fetch(url, {
          signal: AbortSignal.timeout(5000) // Timeout 5 segundos
        });
        
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const data = await response.json();
        const temp = Math.round(data.current.temperature_2m);
        
        STATE.temp = temp;
        
        // Determinar color e icono por temperatura
        let colorClass = 'cool';
        let iconName = 'cloud-rain';
        
        if (temp < 0) {
          colorClass = 'cold';
          iconName = 'cloud-snow';
        } else if (temp < 15) {
          colorClass = 'cool';
          iconName = 'cloud-rain';
        } else if (temp < 25) {
          colorClass = 'warm';
          iconName = 'cloud-sun';
        } else {
          colorClass = 'hot';
          iconName = 'sun';
        }

        // Actualizar UI con cambios visuales
        tempValue.className = `temp-value ${colorClass}`;
        tempValue.innerHTML = `<span>${temp}°C</span>`;
        tempLabel.textContent = colorClass.toUpperCase();
        
        tempBox.classList.remove('loading');
        tempBox.className = `tempBox ${colorClass}`;
        tempIcon.className = `iconoir-${iconName}`;
        
        // Actualizar popup y mostrar toast
        updatePopup(STATE.lat, STATE.lon, STATE.acc, STATE.alt, STATE.heading);
        showToast(`🌡️ ${temp}°C en tiempo real`, 'ok');
        
      } catch (error) {
        console.error('Error obteniendo temperatura:', error);
        tempValue.innerHTML = '<span>—°C</span>';
        tempLabel.textContent = 'Sin conexión';
        tempBox.classList.remove('loading');
        showToast('⚠️ No se pudo obtener la temperatura', 'err');
      } finally {
        refreshBtn.classList.remove('refreshing');
      }
    }

    // ════════════════════════════════════════════════════════════
    // GEOLOCALIZACIÓN
    // ═════��══════════════════════════════════════════════════════
    function startTracking() {
      if (!navigator.geolocation) {
        showPermDenied();
        return;
      }

      const options = {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0,
      };

      STATE.watchId = navigator.geolocation.watchPosition(
        (pos) => {
          const { latitude, longitude, accuracy, altitude, heading } = pos.coords;
          STATE.lat = latitude;
          STATE.lon = longitude;
          STATE.acc = accuracy;
          STATE.alt = altitude;
          STATE.heading = heading;

          updateUI();
          placeMarker(latitude, longitude, accuracy, altitude, heading);
        },
        (err) => {
          console.error('Geolocation error:', err);
          if (err.code === 1) showPermDenied();
        },
        options
      );
    }

    // ════════════════════════════════════════════════════════════
    // ACTUALIZAR UI
    // ═══════════════════════════��════════════════════════════════
    function updateUI() {
      if (STATE.lat === null) return;

      document.getElementById('cMain').textContent = `${STATE.lat.toFixed(6)}, ${STATE.lon.toFixed(6)}`;
      document.getElementById('cSub').textContent = `Precisión ±${Math.round(STATE.acc)}m • ${new Date().toLocaleTimeString('es-ES')}`;

      document.getElementById('sLat').textContent = STATE.lat.toFixed(6);
      document.getElementById('sLon').textContent = STATE.lon.toFixed(6);
      document.getElementById('sAcc').textContent = `±${Math.round(STATE.acc)}m`;

      document.getElementById('hudDot').className = 'hud-dot active';
      document.getElementById('hudBadge').classList.add('ok');
      document.getElementById('hudAcc').textContent = `±${Math.round(STATE.acc)}m`;
    }

    // ════════════════════════════════════════════════════════════
    // COPIAR COORDENADAS
    // ════════════════════════════════════════════════════════════
    async function copyCoords() {
      if (STATE.lat === null) return;

      const text = `${STATE.lat.toFixed(6)}, ${STATE.lon.toFixed(6)}`;
      try {
        await navigator.clipboard.writeText(text);
        const btn = document.getElementById('btnCopy');
        btn.classList.add('copied');
        btn.innerHTML = '<i class="iconoir-check"></i> <span>Copiado</span>';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = '<i class="iconoir-copy"></i> <span>Copiar</span>';
        }, 2000);
        showToast('✓ Coordenadas copiadas', 'ok');
      } catch (err) {
        showToast('Error al copiar', 'err');
      }
    }

    // ════════════════════════════════════════════════════════════
    // COMPARTIR EN WHATSAPP
    // ════════════════════════════════════════════════════════════
    function shareWA() {
      if (STATE.lat === null) return;

      const text = `📍 Mi ubicación en vivo:\nhttps://maps.google.com/?q=${STATE.lat},${STATE.lon}`;
      const encodedText = encodeURIComponent(text);
      window.open(`https://wa.me/?text=${encodedText}`, '_blank');
    }

    // ════════════════════════════════════════════════════════════
    // COMPARTIR NATIVO
    // ════════════════════════════════════════════════════════════
    async function shareNative() {
      if (STATE.lat === null || !navigator.share) {
        shareWA();
        return;
      }

      try {
        await navigator.share({
          title: 'Mi Ubicación',
          text: `📍 Lat: ${STATE.lat.toFixed(6)}, Lon: ${STATE.lon.toFixed(6)}`,
          url: `https://maps.google.com/?q=${STATE.lat},${STATE.lon}`,
        });
      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error('Error compartiendo:', err);
        }
      }
    }

    // ════════════════════════════════════════════════════════════
    // ABRIR EN GOOGLE MAPS
    // ══════════════════════════��═════════════════════════════════
    function openGMaps() {
      if (STATE.lat === null) return;
      window.open(`https://maps.google.com/?q=${STATE.lat},${STATE.lon}`, '_blank');
    }

    // ════════════════════════════════════════════════════════════
    // MOSTRAR/OCULTAR UI
    // ════════════════════════════════════════════════════════════
    function hideSplash() {
      document.getElementById('splash').classList.add('hidden');
    }

    function showPermDenied() {
      document.getElementById('permDenied').classList.add('show');
    }

    function showToast(msg, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `show ${type}`;
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // ════════════════════════════════════════════════════════════
    // INICIALIZACIÓN
    // ════════════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
      initMap();
      startTracking();
    });

    window.addEventListener('beforeunload', () => {
      STATE.isDestroyed = true;
      if (STATE.watchId) {
        navigator.geolocation.clearWatch(STATE.watchId);
      }
      if (STATE.tempUpdateInterval) {
        clearInterval(STATE.tempUpdateInterval);
      }
    });
  </script>
</body>
</html>
